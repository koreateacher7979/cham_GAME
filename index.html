<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>참마음 배드민턴 클럽 대회 진행 프로그램</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f0fdf4; }
        .player-card.selected { border: 2px solid #16a34a; background-color: #dcfce7; }
        .player-card.eliminated { opacity: 0.5; filter: grayscale(100%); pointer-events: none; }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #86efac; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4ade80; }

        /* Badminton Court UI CSS */
        .badminton-court {
            background-color: #16a34a; /* bg-green-600 */
            border: 2px solid white;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }
        .badminton-net {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background: repeating-linear-gradient(0deg, transparent, transparent 4px, rgba(255,255,255,0.8) 4px, rgba(255,255,255,0.8) 8px);
            transform: translateX(-50%);
            border-left: 1px solid rgba(255,255,255,0.5);
            z-index: 10;
        }
        .badminton-line-inner {
            position: absolute;
            top: 10%; bottom: 10%; left: 8%; right: 8%;
            border: 1px solid rgba(255, 255, 255, 0.4);
            pointer-events: none;
            z-index: 5;
        }
        .badminton-line-center-h {
            position: absolute;
            top: 50%; left: 8%; right: 8%;
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body class="text-gray-800 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-green-700 text-white shadow-lg p-4 z-20">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <i class="fa-solid fa-shuttlecock"></i> 참마음 배드민턴 클럽 자체대회
            </h1>
            <div class="mt-2 sm:mt-0 flex items-center gap-4">
                <span class="text-green-100 font-medium text-sm border border-green-500 px-3 py-1 rounded-full">
                    <i class="fa-solid fa-code"></i> 개발자: 참마음클럽 김병찬
                </span>
                <button id="adminToggleBtn" onclick="toggleAdmin()" class="bg-green-600 hover:bg-green-500 px-3 py-1 rounded shadow text-sm transition">
                    <i class="fa-solid fa-lock"></i> 관리자 로그인
                </button>
            </div>
        </div>
    </header>

    <main class="flex-grow p-4 max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- Left Column: Settings & Participants -->
        <div class="flex flex-col gap-6 lg:col-span-1">
            
            <!-- Visual Match Builder -->
            <div class="bg-white rounded-xl shadow p-5 border-t-4 border-green-500">
                <h2 class="text-lg font-bold mb-3 border-b pb-2"><i class="fa-solid fa-table-tennis-paddle-ball"></i> 대진표 구성</h2>
                
                <p class="text-xs text-gray-500 mb-2">* 아래 명단에서 선수를 클릭하여 코트에 배치하세요.</p>
                <!-- Court Visualizer -->
                <div class="badminton-court rounded-lg h-36 flex relative mb-4">
                    <div class="badminton-line-inner"></div>
                    <div class="badminton-line-center-h"></div>
                    <div class="badminton-net"></div>
                    
                    <!-- Player 1 Slot -->
                    <div class="w-1/2 flex items-center justify-center p-2 z-20">
                        <div id="builder-p1" class="text-white text-center w-full transition-all flex flex-col items-center">
                            <i class="fa-regular fa-user text-4xl mb-1 opacity-50"></i>
                            <p class="text-sm opacity-75">선수 1</p>
                        </div>
                    </div>
                    <!-- Player 2 Slot -->
                    <div class="w-1/2 flex items-center justify-center p-2 z-20">
                        <div id="builder-p2" class="text-white text-center w-full transition-all flex flex-col items-center">
                            <i class="fa-regular fa-user text-4xl mb-1 opacity-50"></i>
                            <p class="text-sm opacity-75">선수 2</p>
                        </div>
                    </div>
                </div>

                <div class="flex gap-2 mb-4">
                    <input type="number" id="courtInput" placeholder="코트 번호 (예: 1)" class="w-1/2 border-gray-300 rounded-md shadow-sm p-2 border focus:border-green-500 font-bold text-center">
                    <button onclick="createMatch()" class="w-1/2 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-md transition shadow flex items-center justify-center gap-2">
                        <i class="fa-solid fa-plus"></i> 대진표 추가
                    </button>
                </div>

                <!-- Tournament Settings -->
                <div class="pt-3 border-t">
                    <label class="block text-sm font-medium text-gray-700 mb-1">경기 방식 설정 (공통)</label>
                    <select id="tournamentMode" onchange="changeMode()" class="w-full text-sm border-gray-300 rounded-md shadow-sm p-2 border focus:border-green-500 focus:ring focus:ring-green-200 focus:ring-opacity-50">
                        <option value="points">개인전 득점 합산 (리그제)</option>
                        <option value="tournament">토너먼트 (서바이벌)</option>
                    </select>
                </div>
            </div>

            <!-- Participants List -->
            <div class="bg-white rounded-xl shadow p-5 flex-grow flex flex-col border-t-4 border-green-500">
                <div class="flex justify-between items-center mb-3 border-b pb-2">
                    <h2 class="text-lg font-bold"><i class="fa-solid fa-users"></i> 참가자 현황</h2>
                    <span id="participantCount" class="text-sm bg-green-100 text-green-800 py-1 px-2 rounded-full font-bold">0명</span>
                </div>
                <div id="loadingIndicator" class="text-center text-gray-500 py-4">
                    <i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i><br>
                    스프레드시트에서 데이터를 불러오는 중...
                </div>
                <div id="participantList" class="flex-grow overflow-y-auto max-h-[400px] space-y-2 pr-1 hidden">
                    <!-- Participant Cards will be injected here -->
                </div>
            </div>
        </div>

        <!-- Middle & Right Column: Matches & Standings -->
        <div class="lg:col-span-2 flex flex-col gap-6">
            
            <!-- Match Board -->
            <div class="bg-white rounded-xl shadow p-5 border-t-4 border-blue-500 min-h-[400px]">
                <h2 class="text-lg font-bold mb-3 border-b pb-2"><i class="fa-solid fa-table-list"></i> 진행/예정된 경기 현황</h2>
                <div id="matchList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="text-gray-400 italic col-span-full text-center py-10">생성된 경기가 없습니다. 선수를 선택하여 대진표를 추가해주세요.</div>
                </div>
            </div>

            <!-- Leaderboard / Tournament Status -->
            <div class="bg-white rounded-xl shadow p-5 border-t-4 border-yellow-500">
                <h2 class="text-lg font-bold mb-3 border-b pb-2" id="standingsTitle"><i class="fa-solid fa-trophy text-yellow-500"></i> 현재 순위 (득점 합산)</h2>
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200 text-sm text-center">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-2 font-medium text-gray-500">순위</th>
                                <th class="px-4 py-2 font-medium text-gray-500">이름</th>
                                <th class="px-4 py-2 font-medium text-gray-500">급수/연령</th>
                                <th class="px-4 py-2 font-medium text-gray-500">경기수</th>
                                <th class="px-4 py-2 font-medium text-gray-500">총 득점</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboardBody" class="bg-white divide-y divide-gray-200">
                            <!-- Leaderboard injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Admin Password Modal -->
    <div id="adminModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
        <div class="bg-white rounded-xl shadow-2xl p-6 w-96 max-w-full mx-4">
            <h3 class="text-xl font-bold mb-4 text-gray-800"><i class="fa-solid fa-lock"></i> 관리자 인증</h3>
            <p class="text-sm text-gray-600 mb-4">점수 입력 및 관리를 위해 비밀번호를 입력하세요.</p>
            <input type="password" id="adminPwInput" class="w-full border-gray-300 rounded-md shadow-sm p-3 border mb-4 focus:outline-none focus:border-green-500" placeholder="비밀번호 입력">
            <div class="flex justify-end gap-2">
                <button onclick="closeModal('adminModal')" class="px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded text-gray-800 transition">취소</button>
                <button onclick="authenticateAdmin()" class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded transition">확인</button>
            </div>
        </div>
    </div>

    <!-- Score Input Modal -->
    <div id="scoreModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
        <div class="bg-white rounded-xl shadow-2xl p-6 w-[400px] max-w-full mx-4">
            <h3 class="text-xl font-bold mb-4 text-gray-800 text-center">경기 결과 입력</h3>
            <p id="scoreModalSub" class="text-center text-sm text-gray-500 mb-6 font-bold text-blue-600">코트 1</p>
            
            <div class="flex justify-between items-center gap-4 mb-6 relative p-4 rounded-lg bg-gray-50 border">
                <div class="text-center w-2/5 z-10">
                    <p id="scorePlayer1Name" class="font-bold text-lg mb-2 truncate">선수1</p>
                    <input type="number" id="score1Input" class="w-full text-center text-3xl font-black text-blue-600 border-gray-300 rounded-md shadow-sm p-2 border focus:border-blue-500" min="0" placeholder="0">
                </div>
                <div class="text-2xl font-black text-gray-300 z-10">VS</div>
                <div class="text-center w-2/5 z-10">
                    <p id="scorePlayer2Name" class="font-bold text-lg mb-2 truncate">선수2</p>
                    <input type="number" id="score2Input" class="w-full text-center text-3xl font-black text-red-600 border-gray-300 rounded-md shadow-sm p-2 border focus:border-red-500" min="0" placeholder="0">
                </div>
            </div>
            
            <input type="hidden" id="currentMatchId">
            <div class="flex justify-end gap-2">
                <button onclick="closeModal('scoreModal')" class="px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded text-gray-800 transition">취소</button>
                <button onclick="saveScore()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded transition font-bold">결과 저장</button>
            </div>
        </div>
    </div>

    <!-- Message Box (Alert substitute) -->
    <div id="messageBox" class="fixed top-5 left-1/2 transform -translate-x-1/2 bg-white px-6 py-3 rounded shadow-xl border-l-4 border-yellow-500 flex items-center gap-3 z-[60] transition-opacity duration-300 opacity-0 pointer-events-none">
        <i class="fa-solid fa-circle-info text-yellow-500"></i>
        <span id="messageText" class="font-medium text-gray-800">메시지</span>
    </div>

    <script>
        // --- State Management ---
        const SHEET_ID = '1pbAQMAbyG0gNJYXCh7zIj4esMPaFVH2NkluFLyY7qUQ';
        const STATE = {
            participants: [],
            matches: [],
            mode: 'points', // 'points' or 'tournament'
            isAdmin: false,
            adminPassword: '1234', // Default, will be overwritten by sheet F2 if possible
            selectedPlayers: [],
            matchIdCounter: 1
        };

        // --- Utility: Message Box ---
        function showMessage(text, type = 'info') {
            const box = document.getElementById('messageBox');
            const icon = box.querySelector('i');
            box.querySelector('#messageText').innerText = text;
            
            box.className = `fixed top-5 left-1/2 transform -translate-x-1/2 bg-white px-6 py-3 rounded shadow-xl border-l-4 flex items-center gap-3 z-[60] transition-opacity duration-300 opacity-100 pointer-events-auto ${type === 'error' ? 'border-red-500' : (type === 'success' ? 'border-green-500' : 'border-yellow-500')}`;
            icon.className = `fa-solid ${type === 'error' ? 'fa-circle-xmark text-red-500' : (type === 'success' ? 'fa-circle-check text-green-500' : 'fa-circle-info text-yellow-500')}`;
            
            setTimeout(() => { box.classList.replace('opacity-100', 'opacity-0'); box.classList.replace('pointer-events-auto', 'pointer-events-none'); }, 3000);
        }

        // --- Init & Data Fetching ---
        window.onload = async () => {
            await fetchGoogleSheetData();
            renderAll();
        };

        async function fetchGoogleSheetData() {
            const participantUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=참가자현황`;
            const adminUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=총현황&range=F2:F2`;

            try {
                // Fetch Participants
                const pRes = await fetch(participantUrl);
                if (!pRes.ok) throw new Error('Sheet access denied');
                const pText = await pRes.text();
                parseParticipantsCSV(pText);

                // Fetch Admin PW
                try {
                    const aRes = await fetch(adminUrl);
                    if (aRes.ok) {
                        const aText = await aRes.text();
                        const pw = aText.replace(/['"]/g, '').trim();
                        if (pw) STATE.adminPassword = pw;
                    }
                } catch(e) { console.warn('Admin password fetch failed, using default.'); }

                document.getElementById('loadingIndicator').classList.add('hidden');
                document.getElementById('participantList').classList.remove('hidden');

            } catch (error) {
                console.error("Google Sheets Fetch Error:", error);
                showMessage("스프레드시트가 비공개 상태이거나 접근할 수 없습니다. 시연용 임시 데이터를 로드합니다.", "error");
                loadMockData();
            }
        }

        function parseParticipantsCSV(csvText) {
            const rows = csvText.split('\n').map(row => row.split(',').map(val => val.replace(/^"|"$/g, '').trim()));
            // Assuming A:Name, B:Gender, C:Age, D:Level, E:Participation(True)
            STATE.participants = [];
            for (let i = 1; i < rows.length; i++) { // Skip header
                const row = rows[i];
                if (row.length >= 4 && row[0]) {
                    STATE.participants.push({
                        id: `p_${i}`,
                        name: row[0],
                        gender: row[1] || '-',
                        age: row[2] || '-',
                        level: row[3] || '-',
                        totalPoints: 0,
                        matchesPlayed: 0,
                        eliminated: false // For tournament mode
                    });
                }
            }
            if(STATE.participants.length === 0) loadMockData();
        }

        function loadMockData() {
            STATE.participants = [
                { id: 'p1', name: '김병찬', gender: '남', age: '30대', level: 'A조', totalPoints: 0, matchesPlayed: 0, eliminated: false },
                { id: 'p2', name: '이민호', gender: '남', age: '20대', level: 'B조', totalPoints: 0, matchesPlayed: 0, eliminated: false },
                { id: 'p3', name: '박서준', gender: '남', age: '40대', level: 'A조', totalPoints: 0, matchesPlayed: 0, eliminated: false },
                { id: 'p4', name: '아이유', gender: '여', age: '20대', level: 'C조', totalPoints: 0, matchesPlayed: 0, eliminated: false },
                { id: 'p5', name: '유재석', gender: '남', age: '50대', level: 'D조', totalPoints: 0, matchesPlayed: 0, eliminated: false },
                { id: 'p6', name: '김종국', gender: '남', age: '40대', level: 'A조', totalPoints: 0, matchesPlayed: 0, eliminated: false },
            ];
            document.getElementById('loadingIndicator').classList.add('hidden');
            document.getElementById('participantList').classList.remove('hidden');
        }

        // --- Render Functions ---
        function renderAll() {
            renderParticipants();
            updateCourtVisual();
            renderMatches();
            renderLeaderboard();
        }

        function renderParticipants() {
            const listEl = document.getElementById('participantList');
            document.getElementById('participantCount').innerText = `${STATE.participants.length}명`;
            listEl.innerHTML = '';

            STATE.participants.forEach(p => {
                const isSelected = STATE.selectedPlayers.includes(p.id);
                const isEliminated = STATE.mode === 'tournament' && p.eliminated;
                
                const card = document.createElement('div');
                card.className = `player-card p-3 bg-gray-50 border rounded-lg cursor-pointer transition hover:bg-gray-100 flex justify-between items-center ${isSelected ? 'selected' : ''} ${isEliminated ? 'eliminated' : ''}`;
                card.onclick = () => togglePlayerSelection(p.id);
                
                card.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-green-100 flex items-center justify-center text-green-700 font-bold">
                            ${p.name.charAt(0)}
                        </div>
                        <div>
                            <div class="font-bold text-gray-800">${p.name} ${isEliminated ? '<span class="text-xs text-red-500 font-normal">(탈락)</span>' : ''}</div>
                            <div class="text-xs text-gray-500">${p.level} | ${p.age} | ${p.gender}</div>
                        </div>
                    </div>
                    ${isSelected ? '<i class="fa-solid fa-check text-green-600 text-xl"></i>' : ''}
                `;
                listEl.appendChild(card);
            });
        }

        function updateCourtVisual() {
            const p1Slot = document.getElementById('builder-p1');
            const p2Slot = document.getElementById('builder-p2');

            const p1 = STATE.selectedPlayers[0] ? STATE.participants.find(p => p.id === STATE.selectedPlayers[0]) : null;
            const p2 = STATE.selectedPlayers[1] ? STATE.participants.find(p => p.id === STATE.selectedPlayers[1]) : null;

            if (p1) {
                p1Slot.innerHTML = `
                    <div class="bg-white text-green-800 font-black px-4 py-1.5 rounded shadow-lg border-2 border-green-200 w-full truncate max-w-[120px] mb-1">${p1.name}</div>
                    <div class="text-xs font-bold text-green-100 bg-green-800 px-2 py-0.5 rounded-full">${p1.level}</div>
                `;
            } else {
                p1Slot.innerHTML = `<i class="fa-regular fa-user text-4xl mb-1 opacity-50"></i><p class="text-sm opacity-75">선수 1 선택</p>`;
            }

            if (p2) {
                p2Slot.innerHTML = `
                    <div class="bg-white text-green-800 font-black px-4 py-1.5 rounded shadow-lg border-2 border-green-200 w-full truncate max-w-[120px] mb-1">${p2.name}</div>
                    <div class="text-xs font-bold text-green-100 bg-green-800 px-2 py-0.5 rounded-full">${p2.level}</div>
                `;
            } else {
                p2Slot.innerHTML = `<i class="fa-regular fa-user text-4xl mb-1 opacity-50"></i><p class="text-sm opacity-75">선수 2 선택</p>`;
            }
        }

        function renderMatches() {
            const listEl = document.getElementById('matchList');
            listEl.innerHTML = '';

            if (STATE.matches.length === 0) {
                listEl.innerHTML = '<div class="text-gray-400 italic col-span-full text-center py-10">생성된 경기가 없습니다. 선수를 선택하여 대진표를 추가해주세요.</div>';
                return;
            }

            // Sort so uncompleted matches are first
            const sortedMatches = [...STATE.matches].sort((a, b) => (a.completed === b.completed) ? 0 : a.completed ? 1 : -1);

            sortedMatches.forEach(m => {
                const p1 = STATE.participants.find(p => p.id === m.p1Id);
                const p2 = STATE.participants.find(p => p.id === m.p2Id);
                
                const card = document.createElement('div');
                card.className = `border rounded-xl p-3 shadow-sm flex flex-col justify-between ${m.completed ? 'bg-gray-50 border-gray-200 opacity-80' : 'bg-white border-blue-200'}`;
                
                let content = `
                    <div class="flex justify-between items-center mb-2 px-1">
                        <span class="bg-blue-100 text-blue-800 text-xs font-bold px-2 py-1 rounded-full"><i class="fa-solid fa-map-location-dot"></i> 코트 ${m.court}</span>
                        <span class="text-xs font-bold ${m.completed ? 'text-gray-500' : 'text-green-600 animate-pulse'}">${m.completed ? '경기 종료' : '진행 대기'}</span>
                    </div>
                    
                    <!-- Match Mini Court -->
                    <div class="badminton-court rounded-lg h-24 flex relative mb-3 ${m.completed ? 'grayscale opacity-75' : ''}">
                        <div class="badminton-line-inner"></div>
                        <div class="badminton-net"></div>
                        
                        <div class="w-1/2 flex flex-col items-center justify-center z-20 text-white p-1 relative">
                            ${m.completed && m.score1 > m.score2 ? '<div class="absolute top-1 left-2 text-yellow-300 text-xs font-bold drop-shadow"><i class="fa-solid fa-crown"></i> WIN</div>' : ''}
                            <div class="font-bold text-md truncate w-full text-center drop-shadow-md" title="${p1.name}">${p1.name}</div>
                            ${m.completed ? `<div class="text-3xl font-black text-yellow-300 drop-shadow-md mt-1 leading-none">${m.score1}</div>` : ''}
                        </div>
                        
                        <div class="w-1/2 flex flex-col items-center justify-center z-20 text-white p-1 relative">
                            ${m.completed && m.score2 > m.score1 ? '<div class="absolute top-1 right-2 text-yellow-300 text-xs font-bold drop-shadow"><i class="fa-solid fa-crown"></i> WIN</div>' : ''}
                            <div class="font-bold text-md truncate w-full text-center drop-shadow-md" title="${p2.name}">${p2.name}</div>
                            ${m.completed ? `<div class="text-3xl font-black text-yellow-300 drop-shadow-md mt-1 leading-none">${m.score2}</div>` : ''}
                        </div>
                    </div>
                `;

                if (!m.completed) {
                    content += `
                        <div class="flex gap-2">
                            <button onclick="announceTTS('${p1.name}', '${p2.name}', '${m.court}')" class="w-1/2 bg-yellow-100 hover:bg-yellow-200 text-yellow-800 py-1.5 rounded text-sm font-bold transition flex items-center justify-center gap-1">
                                <i class="fa-solid fa-bullhorn"></i> 방송
                            </button>
                            <button onclick="openScoreModal(${m.id})" class="w-1/2 bg-blue-100 hover:bg-blue-200 text-blue-800 py-1.5 rounded text-sm font-bold transition flex items-center justify-center gap-1">
                                <i class="fa-solid fa-pen"></i> 결과 입력
                            </button>
                        </div>
                    `;
                }
                card.innerHTML = content;
                listEl.appendChild(card);
            });
        }

        function renderLeaderboard() {
            const body = document.getElementById('leaderboardBody');
            const title = document.getElementById('standingsTitle');
            body.innerHTML = '';

            if (STATE.mode === 'tournament') {
                title.innerHTML = '<i class="fa-solid fa-sitemap text-yellow-500"></i> 생존자 현황 (토너먼트)';
                // In tournament mode, just show people who are not eliminated
                const survivors = STATE.participants.filter(p => !p.eliminated);
                survivors.forEach((p, index) => {
                    body.innerHTML += `
                        <tr class="hover:bg-gray-50">
                            <td class="px-4 py-3 whitespace-nowrap"><span class="bg-green-100 text-green-800 px-2 py-1 rounded text-xs font-bold">생존</span></td>
                            <td class="px-4 py-3 whitespace-nowrap font-bold">${p.name}</td>
                            <td class="px-4 py-3 whitespace-nowrap text-gray-500">${p.level} / ${p.age}</td>
                            <td class="px-4 py-3 whitespace-nowrap text-gray-500">${p.matchesPlayed}</td>
                            <td class="px-4 py-3 whitespace-nowrap text-gray-400">-</td>
                        </tr>
                    `;
                });
            } else {
                title.innerHTML = '<i class="fa-solid fa-trophy text-yellow-500"></i> 현재 순위 (득점 합산)';
                const sorted = [...STATE.participants].sort((a, b) => b.totalPoints - a.totalPoints || b.matchesPlayed - a.matchesPlayed);
                
                sorted.forEach((p, index) => {
                    if (p.matchesPlayed === 0 && p.totalPoints === 0) return; // Hide unplayed in points mode initially to save space, or show all. Let's show all.
                    
                    let rankIcon = `${index + 1}`;
                    if (index === 0) rankIcon = '<i class="fa-solid fa-medal text-yellow-400 text-lg"></i>';
                    else if (index === 1) rankIcon = '<i class="fa-solid fa-medal text-gray-400 text-lg"></i>';
                    else if (index === 2) rankIcon = '<i class="fa-solid fa-medal text-orange-400 text-lg"></i>';

                    body.innerHTML += `
                        <tr class="hover:bg-gray-50">
                            <td class="px-4 py-3 whitespace-nowrap font-bold">${rankIcon}</td>
                            <td class="px-4 py-3 whitespace-nowrap font-bold">${p.name}</td>
                            <td class="px-4 py-3 whitespace-nowrap text-gray-500">${p.level} / ${p.age}</td>
                            <td class="px-4 py-3 whitespace-nowrap text-gray-500">${p.matchesPlayed}</td>
                            <td class="px-4 py-3 whitespace-nowrap font-black text-blue-600">${p.totalPoints}</td>
                        </tr>
                    `;
                });
                
                if (body.innerHTML === '') {
                     body.innerHTML = '<tr><td colspan="5" class="px-4 py-8 text-gray-400 text-center italic">아직 진행된 경기가 없습니다.</td></tr>';
                }
            }
        }

        // --- Logic & Interactions ---

        function changeMode() {
            const mode = document.getElementById('tournamentMode').value;
            STATE.mode = mode;
            // Reset tournament specific states if changing modes
            if (mode === 'points') {
                STATE.participants.forEach(p => p.eliminated = false);
            }
            STATE.selectedPlayers = [];
            renderAll();
            showMessage(`경기 방식이 [${mode === 'points' ? '개인전 득점 합산' : '토너먼트'}]으로 변경되었습니다.`, 'success');
        }

        function togglePlayerSelection(id) {
            const player = STATE.participants.find(p => p.id === id);
            if (STATE.mode === 'tournament' && player.eliminated) {
                showMessage("이미 탈락한 선수는 선택할 수 없습니다.", "error");
                return;
            }

            const index = STATE.selectedPlayers.indexOf(id);
            if (index > -1) {
                STATE.selectedPlayers.splice(index, 1);
            } else {
                if (STATE.selectedPlayers.length >= 2) {
                    STATE.selectedPlayers.shift(); // Keep only 2 selected
                }
                STATE.selectedPlayers.push(id);
            }
            renderAll(); // Will update participants list and the visual court
        }

        function createMatch() {
            if (STATE.selectedPlayers.length !== 2) {
                showMessage("코트에 배치할 선수 2명을 선택해주세요.", "error");
                return;
            }
            const court = document.getElementById('courtInput').value || "?";
            
            STATE.matches.push({
                id: STATE.matchIdCounter++,
                p1Id: STATE.selectedPlayers[0],
                p2Id: STATE.selectedPlayers[1],
                court: court,
                score1: 0,
                score2: 0,
                completed: false
            });

            STATE.selectedPlayers = [];
            document.getElementById('courtInput').value = '';
            renderAll();
            showMessage("대진표에 경기가 추가되었습니다.", "success");
        }

        // --- TTS Announcer ---
        function announceTTS(p1Name, p2Name, court) {
            if (!window.speechSynthesis) {
                showMessage("이 브라우저는 음성 안내를 지원하지 않습니다.", "error");
                return;
            }
            
            const text = `안내 말씀 드립니다. ${court}번 코트. ${p1Name} 대 ${p2Name} 경기 시작합니다. 출전 선수들은 ${court}번 코트로 입장해 주시기 바랍니다.`;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ko-KR';
            utterance.rate = 0.9;
            utterance.pitch = 1;
            
            window.speechSynthesis.speak(utterance);
            showMessage(`"${court}번 코트 호출 방송 중..."`, "info");
        }

        // --- Admin & Scoring ---
        function toggleAdmin() {
            if (STATE.isAdmin) {
                STATE.isAdmin = false;
                document.getElementById('adminToggleBtn').innerHTML = '<i class="fa-solid fa-lock"></i> 관리자 로그인';
                document.getElementById('adminToggleBtn').className = 'bg-green-600 hover:bg-green-500 px-3 py-1 rounded shadow text-sm transition';
                showMessage("관리자 모드가 해제되었습니다.");
            } else {
                openModal('adminModal');
            }
        }

        function authenticateAdmin() {
            const input = document.getElementById('adminPwInput').value;
            if (input === STATE.adminPassword) {
                STATE.isAdmin = true;
                closeModal('adminModal');
                document.getElementById('adminToggleBtn').innerHTML = '<i class="fa-solid fa-unlock"></i> 관리자 로그아웃';
                document.getElementById('adminToggleBtn').className = 'bg-red-600 hover:bg-red-500 px-3 py-1 rounded shadow text-sm transition';
                document.getElementById('adminPwInput').value = '';
                showMessage("관리자 모드로 전환되었습니다.", "success");
            } else {
                showMessage("비밀번호가 일치하지 않습니다.", "error");
            }
        }

        function openScoreModal(matchId) {
            if (!STATE.isAdmin) {
                showMessage("점수 입력은 관리자 모드에서만 가능합니다. 먼저 로그인하세요.", "error");
                openModal('adminModal');
                return;
            }

            const match = STATE.matches.find(m => m.id === matchId);
            const p1 = STATE.participants.find(p => p.id === match.p1Id);
            const p2 = STATE.participants.find(p => p.id === match.p2Id);

            document.getElementById('currentMatchId').value = matchId;
            document.getElementById('scoreModalSub').innerText = `코트 ${match.court} 경기 기록`;
            document.getElementById('scorePlayer1Name').innerText = p1.name;
            document.getElementById('scorePlayer2Name').innerText = p2.name;
            document.getElementById('score1Input').value = '';
            document.getElementById('score2Input').value = '';

            openModal('scoreModal');
        }

        function saveScore() {
            const matchId = parseInt(document.getElementById('currentMatchId').value);
            const s1 = parseInt(document.getElementById('score1Input').value) || 0;
            const s2 = parseInt(document.getElementById('score2Input').value) || 0;

            const match = STATE.matches.find(m => m.id === matchId);
            match.score1 = s1;
            match.score2 = s2;
            match.completed = true;

            const p1 = STATE.participants.find(p => p.id === match.p1Id);
            const p2 = STATE.participants.find(p => p.id === match.p2Id);

            // Update Statistics
            p1.matchesPlayed++;
            p2.matchesPlayed++;

            if (STATE.mode === 'points') {
                p1.totalPoints += s1;
                p2.totalPoints += s2;
            } else if (STATE.mode === 'tournament') {
                // Elimination logic
                if (s1 > s2) p2.eliminated = true;
                else if (s2 > s1) p1.eliminated = true;
                // If draw, no one eliminated for simplicity, or handle manually
            }

            closeModal('scoreModal');
            renderAll();
            showMessage("경기 결과가 저장되었습니다.", "success");
        }

        // --- Modals ---
        function openModal(id) {
            document.getElementById(id).classList.remove('hidden');
        }

        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
        }
    </script>
</body>
</html>
